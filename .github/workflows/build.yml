name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm install --no-audit --no-fund || true
      - name: Test
        run: node src/test.js
      - name: Build artifact
        run: |
          mkdir -p dist
          echo "build $(date -u +%FT%TZ) sha=${GITHUB_SHA}" > dist/build.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/build.txt
          retention-days: 7
